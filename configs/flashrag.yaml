project_name: set-switch
run_name: qwen3_4b_setswitch
seed: 42

# choices: setswitch, chat_baseline, setllm, setfuse
# You can also override this at launch:
#   accelerate launch scripts/train.py --config configs/flashrag.yaml --interface setllm
model_interface: setswitch

model:
  name_or_path: Qwen/Qwen3-4B
  dtype: bfloat16
  attn_implementation: eager
  use_lora: false

method_overrides:
  chat_baseline:
    run_name: qwen3_4b_chat_baseline
    model:
      # The plain causal baseline can use PyTorch SDPA/Flash kernels.
      attn_implementation: sdpa
      use_lora: true
      lora_r: 8
      lora_alpha: 1
      lora_dropout: 0.0
      lora_target_modules: all-linear
    train:
      # LoRA/SetLLM literature commonly tunes around 3e-4 to 1e-3.
      learning_rate: 0.0003
  setswitch:
    run_name: qwen3_4b_setswitch
    model:
      # SDPA honors the dense custom 4D masks in the current Torch/Transformers stack.
      # Use scripts/check_sdpa_mask_equivalence.py for exact-model parity checks.
      attn_implementation: sdpa
      use_lora: true
      trainable: setswitch_tokens
      setswitch_token_init: semantic
      setswitch_token_init_noise_std: 0.01
      lora_r: 8
      lora_alpha: 1
      lora_dropout: 0.0
      lora_target_modules: all-linear
    train:
      # Fair primary comparison: SetSwitch special tokens plus the same LoRA
      # budget used by the SetLLM baseline. The small SetSwitch embedding table
      # gets a higher prompt-tuning-style LR.
      learning_rate: 0.0003
      special_token_learning_rate: 0.001
      special_token_lr_multipliers:
        boundary: 1.0
        read: 1.0
        gather: 1.0
  setllm:
    run_name: qwen3_4b_setllm_lora
    model:
      # SetMask is also a custom 4D mask; SDPA parity is checked by the repo script.
      attn_implementation: sdpa
      use_lora: true
      lora_r: 8
      lora_alpha: 1
      lora_dropout: 0.0
      lora_target_modules: all-linear
    train:
      learning_rate: 0.0003
  setfuse:
    run_name: qwen3_4b_setfuse_lora
    model:
      # SetFuse-LM uses layer-scheduled custom 4D masks; SDPA is faster and
      # matches eager on the repo parity check.
      attn_implementation: sdpa
      use_lora: true
      lora_r: 8
      lora_alpha: 1
      lora_dropout: 0.0
      lora_target_modules: all-linear
    data:
      setfuse_answer_prefix: "\nAnswer:\n"
    train:
      learning_rate: 0.0003

data:
  source: flashrag
  dataset_name: RUC-NLPIR/FlashRAG_datasets

  # Final v0 task buckets:
  #   normal_mcq:     commonsenseqa, openbookqa, arc, hellaswag, mmlu, quartz
  #   retrieved_qa:   msmarco-qa
  #   single_passage: squad, kept as a small extractive QA control
  #   rag_multi_hop:  hotpotqa, 2wikimultihopqa, native MuSiQue
  #
  # Training mix for 100k examples:
  #   normal_mcq:      9k total, kept deliberately small as a control bucket
  #   retrieved_qa:   17k total, multi-passage retrieved QA
  #   single_passage: 10k total, one SQuAD control bucket
  #   rag_multi_hop:  64k total, emphasized for the main claim
  # These are train-only limits; paper eval uses eval.max_examples below.
  datasets:
    - name: commonsenseqa
      train_max_examples: 1500
    - name: openbookqa
      train_max_examples: 1500
    - name: arc
      train_max_examples: 1500
    - name: hellaswag
      train_max_examples: 1500
    - name: mmlu
      train_max_examples: 1500
    - name: quartz
      train_max_examples: 1500
    - name: msmarco-qa
      train_max_examples: 17000
      # Paper/test-style eval uses a deterministic random 10k sample from the
      # public labeled dev split instead of the full 101k-row MS MARCO dev set.
      paper_max_examples: 10000
      paper_sample_strategy: random
      paper_sample_seed: 42
    - name: squad
      train_max_examples: 10000
    - name: hotpotqa
      train_max_examples: 29062
    - name: 2wikimultihopqa
      train_max_examples: 15000
    - name: musique
      train_max_examples: 19938
  #
  # Compact percentage syntax is also supported. hotpotqa[:0.5] means 50% of
  # the selected split, while mmlu[dev:10%] means 10% of MMLU dev.
  # datasets: ["hotpotqa[:0.5]", "2wiki[:50%]", "msmarco[:0.01]"]
  #
  # Or per-dataset controls:
  # datasets:
  #   - name: hotpotqa
  #     split: train
  #     max_examples: 5000
  #   - name: msmarco-qa
  #     split: train
  #     percent: 0.01

  # If set, examples are allocated by sample_allocation unless a dataset entry has
  # max_examples. Small datasets naturally cap at their available train/dev size.
  total_train_examples: 100000
  # Legacy direct-training validation cap. The paper eval path uses eval.max_examples.
  total_val_examples: 1000
  # Task-balanced first, then source-balanced within each task. This prevents
  # MS MARCO or any other large source from dominating the first comparison.
  sample_allocation: task_balanced_equal

  # SetSwitch/SetLLM structurally support more docs, but custom eager 4D masks
  # scale as O(sequence_length^2). Use scripts/estimate_context.py before
  # pushing max_docs/max_doc_tokens higher.
  max_docs: 20
  # Keep full converted documents by default. Set this to an integer, e.g. 512,
  # only for memory-controlled runs.
  max_doc_tokens:
  # Train-only rendered-length guard. Dataset preparation and direct training skip
  # training examples whose rendered prompt+answer exceeds this cap. Evaluation/test
  # intentionally ignores this so long-context behavior is still measured.
  train_max_render_tokens: 4096
  length_filter_interfaces: all
  # If max_doc_tokens is set, gold/support documents keep a token window around
  # an answer mention when it appears; otherwise they fall back to head truncation.
  doc_truncation: answer_window
  num_reads_per_doc: 2
  num_gather_tokens: 4
  compact_special_token_format: true
  setswitch_boundary_tokens: true
  read_gather_position_mode: continuous
  setswitch_answer_prefix: "\nAnswer:\n"
  append_eos_token: true
  setllm_append_eos_token: true
  instruction: "Use the provided passages or options to answer the question."

mask:
  # Build dense custom 4D masks after Accelerator places compact metadata on
  # the training device. This avoids transferring O(T^2) masks from CPU to GPU.
  build_on_device: true
  doc_attention: doc_causal
  answer_attends_raw_docs: false
  answer_attends_reads: false
  fuse_start_layer: auto_half
  setfuse_answer_attends_docs_in_early_layers: false
  setfuse_late_prefix_doc_bidir: true

train:
  max_steps: 5000
  batch_size: 1
  grad_accum_steps: 8
  # Fallback only. Method overrides above set the active LR for each interface.
  learning_rate: 0.0001
  warmup_steps: 100
  weight_decay: 0.0
  max_grad_norm: 1.0
  mixed_precision: bf16
  gradient_checkpointing: true
  local_logging: true
  metrics_file: metrics.jsonl
  log_every: 10
  eval_every: 200
  save_every: 1000

eval:
  # Paper split: public labeled test where available, otherwise labeled dev/validation.
  split: paper
  max_examples: all
  max_new_tokens: 32
  mcq_scoring: logprob
  gold_positions: [0.0, 0.25, 0.5, 0.75, 1.0]
  # For the causal decoder only, MCQ examples are evaluated under several random
  # option permutations and also with per-example majority vote.
  option_permutations: 4
  output: outputs/{run_name}_{interface}_{split}_eval.json
